name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit · build · asset gate · e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # v5+ runs on Node 24 (v4 targets deprecated Node 20)
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests, build, 25 MiB asset gate, e2e
        run: npm run test:ci
        env:
          CI: true
